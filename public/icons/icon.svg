<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1f5e"/>
      <stop offset="50%" stop-color="#1a1035"/>
      <stop offset="100%" stop-color="#100818"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="512" height="512" rx="110" ry="110"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <g clip-path="url(#round)">

    <!-- Straw hat brim (wide ellipse) -->
    <ellipse cx="256" cy="162" rx="155" ry="28" fill="#c8860a"/>
    <ellipse cx="256" cy="158" rx="155" ry="24" fill="#e8a020"/>
    <!-- Hat band -->
    <rect x="156" y="134" width="200" height="22" rx="4" fill="#c8860a"/>
    <!-- Hat top (dome) -->
    <ellipse cx="256" cy="130" rx="98" ry="72" fill="#f5c842"/>
    <ellipse cx="256" cy="118" rx="90" ry="60" fill="#f7d155"/>
    <!-- Hat highlight -->
    <ellipse cx="230" cy="100" rx="30" ry="16" fill="#fae07a" opacity="0.5"/>

    <!-- Skull -->
    <!-- Main skull dome -->
    <ellipse cx="256" cy="272" rx="88" ry="82" fill="#f0ece0"/>
    <!-- Cheekbones -->
    <ellipse cx="256" cy="310" rx="78" ry="52" fill="#f0ece0"/>
    <!-- Jaw -->
    <rect x="196" y="318" width="120" height="38" rx="8" fill="#f0ece0"/>

    <!-- Eye sockets -->
    <ellipse cx="218" cy="268" rx="28" ry="30" fill="#1a1035"/>
    <ellipse cx="294" cy="268" rx="28" ry="30" fill="#1a1035"/>
    <!-- Nose cavity -->
    <path d="M248 296 L256 312 L264 296 Z" fill="#1a1035"/>
    <!-- Teeth -->
    <rect x="208" y="330" width="18" height="22" rx="3" fill="#1a1035"/>
    <rect x="232" y="330" width="18" height="22" rx="3" fill="#1a1035"/>
    <rect x="256" y="330" width="18" height="22" rx="3" fill="#1a1035"/>
    <rect x="280" y="330" width="18" height="22" rx="3" fill="#1a1035"/>

    <!-- Crossbones -->
    <!-- Left bone -->
    <line x1="100" y1="400" x2="412" y2="440" stroke="#f0ece0" stroke-width="22" stroke-linecap="round"/>
    <circle cx="100" cy="400" r="18" fill="#f0ece0"/>
    <circle cx="88"  cy="390" r="12" fill="#f0ece0"/>
    <circle cx="88"  cy="410" r="12" fill="#f0ece0"/>
    <circle cx="412" cy="440" r="18" fill="#f0ece0"/>
    <circle cx="424" cy="430" r="12" fill="#f0ece0"/>
    <circle cx="424" cy="450" r="12" fill="#f0ece0"/>
    <!-- Right bone -->
    <line x1="412" y1="400" x2="100" y2="440" stroke="#f0ece0" stroke-width="22" stroke-linecap="round"/>
    <circle cx="412" cy="400" r="18" fill="#f0ece0"/>
    <circle cx="424" cy="390" r="12" fill="#f0ece0"/>
    <circle cx="424" cy="410" r="12" fill="#f0ece0"/>
    <circle cx="100" cy="440" r="18" fill="#f0ece0"/>
    <circle cx="88"  cy="430" r="12" fill="#f0ece0"/>
    <circle cx="88"  cy="450" r="12" fill="#f0ece0"/>

  </g>
</svg>
