<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1f5e"/>
      <stop offset="50%" stop-color="#1a1035"/>
      <stop offset="100%" stop-color="#100818"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="512" height="512" rx="110" ry="110"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <g clip-path="url(#round)">
    <!-- Stars -->
    <circle cx="80" cy="70" r="5" fill="white" opacity="0.7"/>
    <circle cx="160" cy="45" r="4" fill="white" opacity="0.6"/>
    <circle cx="270" cy="80" r="5" fill="white" opacity="0.7"/>
    <circle cx="130" cy="130" r="3" fill="white" opacity="0.5"/>
    <circle cx="340" cy="55" r="4" fill="white" opacity="0.6"/>
    <circle cx="420" cy="100" r="5" fill="white" opacity="0.7"/>
    <circle cx="60"  cy="170" r="3" fill="white" opacity="0.4"/>

    <!-- Moon (two-circle crescent) -->
    <circle cx="390" cy="105" r="58" fill="#f7e27a"/>
    <circle cx="420" cy="95"  r="50" fill="#1a2448"/>

    <!-- Cake -->
    <text x="256" y="340" font-size="230" text-anchor="middle" dominant-baseline="middle">🎂</text>

    <!-- App name -->
    <text x="256" y="445" font-family="'Bebas Neue', 'Arial Black', sans-serif"
          font-size="52" font-weight="900" letter-spacing="6"
          fill="#f5d76e" text-anchor="middle" opacity="0.9">OP BIRTHDAYS</text>
  </g>
</svg>
